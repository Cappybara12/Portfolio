<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- dark background -->
  <rect width="16" height="16" fill="#0C0C12"/>

  <!-- mast -->
  <rect x="6" y="1" width="1" height="7" fill="#4F46E5"/>

  <!-- sail — triangle growing right -->
  <rect x="7" y="2" width="1" height="1" fill="#A5B4FC"/>
  <rect x="7" y="3" width="2" height="1" fill="#A5B4FC"/>
  <rect x="7" y="4" width="3" height="1" fill="#A5B4FC"/>
  <rect x="7" y="5" width="4" height="1" fill="#A5B4FC"/>
  <rect x="7" y="6" width="4" height="1" fill="#A5B4FC"/>
  <rect x="7" y="7" width="4" height="1" fill="#A5B4FC"/>

  <!-- hull top deck -->
  <rect x="3" y="8"  width="10" height="1" fill="#4F46E5"/>

  <!-- hull body -->
  <rect x="2" y="9"  width="12" height="1" fill="#4F46E5"/>
  <rect x="2" y="10" width="12" height="1" fill="#4F46E5"/>

  <!-- hull bottom (tapered) -->
  <rect x="3" y="11" width="10" height="1" fill="#4F46E5"/>
  <rect x="4" y="12" width="8"  height="1" fill="#4F46E5"/>

  <!-- waterline -->
  <rect x="1" y="13" width="14" height="1" fill="#818CF8"/>
</svg>
